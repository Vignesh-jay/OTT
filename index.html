<!DOCTYPE html>

<html>
<head>
  <title>Jay Streamr</title>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b0b0b" />

  <link rel="apple-touch-icon" href="/images/OTT_Icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <!-- PWA -->

  <link rel="manifest" href="/manifest.json">

  <link rel="icon" href="/images/OTT_Icon.png">

  <!-- Preload -->

  <link rel="preconnect" href="https://ott.vignesh-jay.xyz" crossorigin>
  <link rel="dns-prefetch" href="https://ott.vignesh-jay.xyz">

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #0b0b0b 40%, #000 100%);
      font-family: sans-serif;
    }

    .splash {
      text-align: center;
      color: white;
      animation: fadeIn 1s ease, zoomIn 2.8s ease forwards;
    }

    .logo {
      width: clamp(140px, 18vw, 260px);
      margin-bottom: 24px;
      animation: logoFloat 3s ease-in-out infinite, glowPulse 2.5s ease-in-out infinite;
      filter: drop-shadow(0 0 15px rgba(229,9,20,0.4));
    }

    .text {
      font-size: clamp(14px, 1.5vw, 20px);
      opacity: 0.75;
    }

    .progress {
      width: clamp(180px, 25vw, 320px);
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      overflow: hidden;
      margin: 22px auto 0;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: #e50914;
      animation: loadBar 2.2s ease forwards;
    }

    #installBanner {
      position: fixed;
      bottom: -100px;
      left: 0;
      width: 100%;
      background: rgba(20,20,20,0.95);
      backdrop-filter: blur(10px);
      color: white;
      padding: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: bottom 0.4s ease;
      z-index: 9999;
    }

    @keyframes loadBar { from { width: 0 } to { width: 100% } }
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    @keyframes zoomIn { from { transform: scale(0.92) } to { transform: scale(1) } }
    @keyframes logoFloat { 50% { transform: translateY(-6px) } }
    @keyframes glowPulse { 50% { filter: drop-shadow(0 0 30px rgba(229,9,20,0.6)) } }
    @keyframes fadeOut { to { opacity: 0 } }

    .fade-out { animation: fadeOut 0.4s ease forwards; }
  </style>

</head>

<body>

<div class="splash" id="splash">
  <img class="logo" src="/images/OTT_Logo.png" />
  <div class="text">Launching your experience...</div>
  <div class="progress"><div class="bar"></div></div>
</div>

<div id="installBanner">
  <div>Install Jay StreamR</div>
  <div>
    <button id="dismissInstall">✕</button>
    <button id="installBtn">Install</button>
  </div>
</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/service-worker.js');
}

// Preload
const link = document.createElement("link");
link.rel = "prefetch";
link.href = "https://ott.vignesh-jay.xyz";
document.head.appendChild(link);

let deferredPrompt;
let redirected = false;
let installAvailable = false;

const banner = document.getElementById('installBanner');
const installBtn = document.getElementById('installBtn');
const dismissBtn = document.getElementById('dismissInstall');

function goToOTT() {
  if (redirected) return;
  redirected = true;

  document.getElementById("splash").classList.add("fade-out");

  setTimeout(() => {
    window.location.replace("https://ott.vignesh-jay.xyz");
  }, 350);
}

// Install available
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installAvailable = true;

  setTimeout(() => {
    if (!localStorage.getItem("installDismissed")) {
      banner.style.bottom = "0";
    }
  }, 2200);

  setTimeout(goToOTT, 6000);
});

// Install click
installBtn.addEventListener('click', async () => {
  redirected = true;

  if (!deferredPrompt) return;

  deferredPrompt.prompt();
  await deferredPrompt.userChoice;

  banner.style.bottom = "-100px";
  deferredPrompt = null;
});

// Dismiss
dismissBtn.addEventListener('click', () => {
  banner.style.bottom = "-100px";
  localStorage.setItem("installDismissed", "true");
});

// Fallback redirect
setTimeout(() => {
  if (!installAvailable) {
    goToOTT();
  }
}, 2500);
</script>

</body>
</html>
